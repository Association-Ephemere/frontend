name: Bug report
description: Report unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to help us reproduce the bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem you encountered.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the gallery page
        2. Scroll to the bottom
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or console errors
      render: text

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chromium
        - Chrome
        - Firefox
        - Safari
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "e.g. 20.11.0"
