name: Feature request
description: Propose a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to add to the frontend.

  - type: textarea
    id: context
    attributes:
      label: Context and motivation
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: Describe the expected behavior once implemented.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] The gallery displays new photos at the top without scroll jump
        - [ ] SSE connection closes when job reaches done or error
        - [ ] Component renders correctly on 768px viewport
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Did you consider other approaches?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
